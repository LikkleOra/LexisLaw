# Netlify Configuration for LexisLaw Project (Next.js)

[build]
  # Next.js builds to .next, serve that as static
  publish = ".next"
  command = "npm run build"

[functions]
  # Serverless functions directory (if needed)
  directory = "api"

# Redirect for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Next.js specific headers
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
