# Netlify Configuration for LexisLaw Project

[build]
  # Directory where your static frontend files are located
  publish = "src"
  # Inject Convex URL from environment variable during build
  command = "sed -i 's|https://striped-meadowlark-10.convex.cloud|'\"$VITE_CONVEX_URL\"'|g' src/index.html src/convex.js"

[[redirects]]
  # For client-side routing (SPA fallback)
  from = "/*"
  to = "/index.html"
  status = 200

[[redirects]]
  # Redirect for the admin dashboard
  from = "/admin"
  to = "/admin/dashboard.html"
  status = 200
